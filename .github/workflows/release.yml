name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package release bundle
        run: |
          VERSION="${{ github.event.release.tag_name || github.ref_name }}"
          BUNDLE_DIR="meet-and-talk-${VERSION}"

          chmod +x scripts/package-release.sh
          scripts/package-release.sh "${BUNDLE_DIR}"

          cd "${BUNDLE_DIR}"
          zip -r "../meet-and-talk-${VERSION}.zip" .
          cd ..
          cp "meet-and-talk-${VERSION}.zip" meet-and-talk.zip
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            meet-and-talk-${{ env.VERSION }}.zip
            meet-and-talk.zip

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: meet-and-talk-${{ env.VERSION }}
          path: meet-and-talk-${{ env.VERSION }}.zip
          retention-days: 7
