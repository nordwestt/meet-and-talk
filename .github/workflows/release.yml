name: Release

on:
  push:
    branches: [release]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TAG=v${VERSION}" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package release bundle
        run: |
          BUNDLE_DIR="meet-and-talk-${TAG}"

          chmod +x scripts/package-release.sh
          scripts/package-release.sh "${BUNDLE_DIR}"

          cd "${BUNDLE_DIR}"
          zip -r "../meet-and-talk-${TAG}.zip" .
          cd ..
          cp "meet-and-talk-${TAG}.zip" meet-and-talk.zip

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          files: |
            meet-and-talk-${{ env.TAG }}.zip
            meet-and-talk.zip
          make_latest: true
          generate_release_notes: true
